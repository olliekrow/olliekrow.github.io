<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Olivia Krowicka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    .project-entry { display: grid; grid-template-columns: 1fr 2fr; gap: 4rem; padding: 3rem 0; align-items: start; }
    .project-entry + .project-entry { border-top: 1px solid var(--border); }
    .project-meta { position: sticky; top: 7rem; }
    .project-status { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
    .project-meta h2 { font-size: 1.75rem; font-weight: 800; color: #fff; margin-bottom: 1.25rem; letter-spacing: -0.02em; line-height: 1.15; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
    .project-tag { font-family: 'Fira Code', monospace; font-size: 0.62rem; padding: 0.2rem 0.55rem; border-radius: 4px; background: rgba(255,0,170,0.1); color: var(--accent2); letter-spacing: 0.06em; }
    .project-links { display: flex; flex-direction: column; gap: 0.5rem; }
    .project-link { font-family: 'Fira Code', monospace; font-size: 0.68rem; color: var(--accent); text-decoration: none; letter-spacing: 0.08em; display: flex; align-items: center; gap: 0.4rem; transition: opacity 0.2s; }
    .project-link:hover { opacity: 0.7; }
    .project-body p { color: var(--muted); font-weight: 300; margin-bottom: 1.25rem; font-size: 0.975rem; }
    .project-body p strong { color: var(--text); font-weight: 500; }
    .project-body h3 { font-size: 1rem; font-weight: 700; color: #fff; margin: 2rem 0 0.75rem; }
    .detail-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .detail-list li { font-size: 0.9rem; color: var(--muted); display: flex; align-items: flex-start; gap: 0.6rem; font-weight: 300; }
    .detail-list li::before { content: '›'; color: var(--accent); font-family: 'Fira Code', monospace; flex-shrink: 0; margin-top: 0.1rem; }
    .highlight-box { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 1.25rem 1.5rem; margin: 1.5rem 0; font-size: 0.9rem; color: var(--muted); font-style: italic; }
    @media (max-width: 768px) {
      .project-entry { grid-template-columns: 1fr; gap: 2rem; }
      .project-meta { position: static; }
    }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-mesh-mid"></div>
<div class="grain"></div>
<canvas id="orbs"></canvas>

<nav>
  <a href="index.html" class="nav-logo">OK<span>.</span></a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html" class="active">Projects</a></li>
    <li><a href="blog.html">Writing</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <a href="https://github.com/olliekrow" class="nav-cta" target="_blank">GitHub</a>
</nav>

<main id="main-content"></main>

<footer>
  <p>© 2026 Olivia Krowicka — <a href="index.html">Home</a></p>
  <p><a href="https://github.com/olliekrow" target="_blank">github.com/olliekrow</a></p>
</footer>

<script src="js/orbs.js"></script>
<script src="js/reveal.js"></script>
<script>
async function init() {
  const site = await fetch('data/projects.json').then(r => r.json());
  const dotClass = s => s === 'live' ? 'dot-live' : s === 'wip' ? 'dot-wip' : 'dot-planned';

  const projectsHTML = site.projects.map(p => `
    <div class="project-entry reveal" id="${p.id}">
      <div class="project-meta">
        <div class="project-status"><span class="dot ${dotClass(p.status)}"></span> ${p.status_label}</div>
        <h2>${p.title}</h2>
        <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
        <div class="project-links">
          ${p.links.map(l => `<a href="${l.url}" class="project-link" target="_blank">↗ ${l.label}</a>`).join('')}
        </div>
      </div>
      <div class="project-body">
        <p>${p.detail.intro}</p>
        ${p.detail.sections.map(s => `
          <h3>${s.heading}</h3>
          <ul class="detail-list">${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
        `).join('')}
        <div class="highlight-box">${p.detail.callout}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="page-hero">
      <p class="page-hero-eyebrow">// selected work</p>
      <h1>Projects &<br><span>Experiments.</span></h1>
      <p>A mix of PM infrastructure, game design artifacts, and documentation tooling — built to solve real problems and iterated until they're worth sharing.</p>
    </div>
    <div class="divider"></div>
    <div class="page-section">${projectsHTML}</div>
  `;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Scroll to anchor if present in URL
  const hash = window.location.hash;
  if (hash) {
    setTimeout(() => {
      const el = document.querySelector(hash);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}
init();
</script>
</body>
</html>
