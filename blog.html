<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Ollie Krow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    /* SEARCH + FILTER */
    .blog-controls { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 3rem; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 0.85rem 1.25rem 0.85rem 2.75rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: rgba(0,255,255,0.4); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .tag-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .tag-btn {
      font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.35rem 0.85rem;
      border: 1px solid var(--border); border-radius: 100px;
      color: var(--muted); background: transparent; cursor: pointer; transition: all 0.2s;
    }
    .tag-btn:hover { border-color: rgba(0,255,255,0.4); color: var(--text); }
    .tag-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,255,0.06); }

    /* POST LIST */
    .post-list { display: flex; flex-direction: column; }
    .post-row {
      display: grid; grid-template-columns: 1fr auto; gap: 2rem;
      align-items: start; padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit; transition: opacity 0.2s;
    }
    .post-row:first-child { border-top: 1px solid var(--border); }
    .post-row:hover { opacity: 0.75; }
    .post-row:hover .post-arrow { transform: translateX(4px); color: var(--accent); }
    .post-row-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .post-cat { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); }
    .post-date { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--muted); }
    .post-tag-pill { font-family: 'Fira Code', monospace; font-size: 0.6rem; letter-spacing: 0.08em; padding: 0.15rem 0.5rem; border: 1px solid var(--border); border-radius: 100px; color: var(--muted); }
    .post-row h2 { font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 0.6rem; letter-spacing: -0.01em; line-height: 1.25; }
    .post-row p { font-size: 0.9rem; color: var(--muted); font-weight: 300; max-width: 680px; line-height: 1.65; }
    .post-arrow { font-size: 1.25rem; color: var(--muted); margin-top: 0.5rem; transition: transform 0.2s, color 0.2s; flex-shrink: 0; }
    .no-results { padding: 3rem 0; text-align: center; font-family: 'Fira Code', monospace; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; }

    @media (max-width: 768px) {
      .post-row { grid-template-columns: 1fr; gap: 0.5rem; }
      .post-arrow { display: none; }
    }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-mesh-mid"></div>
<div class="grain"></div>
<canvas id="orbs"></canvas>

<nav>
  <a href="index.html" class="nav-logo">OK<span>.</span></a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="blog.html" class="active">Writing</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <a href="https://github.com/olliekrow" class="nav-cta" target="_blank">GitHub</a>
</nav>

<main>
  <div class="page-hero">
    <p class="page-hero-eyebrow">// writing</p>
    <h1>Process, craft,<br><span>and everything else.</span></h1>
    <p>Thoughts on program management, game design, and the overlapping space between structured thinking and creative work.</p>
  </div>

  <div class="divider"></div>

  <div class="page-section">
    <div class="blog-controls reveal">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="search" type="text" placeholder="Search posts..." autocomplete="off" />
      </div>
      <div class="tag-bar" id="tag-bar">
        <button class="tag-btn active" data-tag="all">All</button>
      </div>
    </div>

    <div class="post-list reveal" id="post-list"></div>
  </div>
</main>

<footer>
  <p>© 2026 Ollie Krow — <a href="index.html">Home</a></p>
  <p><a href="https://github.com/olliekrow" target="_blank">github.com/olliekrow</a></p>
</footer>

<script src="js/orbs.js"></script>
<script src="js/reveal.js"></script>
<script>
let allPosts = [];
let activeTag = 'all';
let searchQuery = '';

async function init() {
  allPosts = await fetch('data/posts.json').then(r => r.json());

  // Build tag list from all posts
  const tagSet = new Set();
  allPosts.forEach(p => p.tags.forEach(t => tagSet.add(t)));
  const tagBar = document.getElementById('tag-bar');
  [...tagSet].sort().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    btn.addEventListener('click', () => setTag(tag));
    tagBar.appendChild(btn);
  });

  render();
}

function setTag(tag) {
  activeTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  render();
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

function render() {
  const list = document.getElementById('post-list');
  const filtered = allPosts.filter(p => {
    const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
    const matchSearch = !searchQuery ||
      p.title.toLowerCase().includes(searchQuery) ||
      p.excerpt.toLowerCase().includes(searchQuery) ||
      p.tags.some(t => t.includes(searchQuery)) ||
      p.category.toLowerCase().includes(searchQuery);
    return matchTag && matchSearch;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="no-results">// no posts found</div>`;
    return;
  }

  list.innerHTML = filtered.map(p => `
    <a href="post.html?slug=${p.slug}" class="post-row">
      <div>
        <div class="post-row-meta">
          <span class="post-cat">${p.category}</span>
          <span class="post-date">${p.date}</span>
          ${p.tags.map(t => `<span class="post-tag-pill">${t}</span>`).join('')}
        </div>
        <h2>${p.title}</h2>
        <p>${p.excerpt}</p>
      </div>
      <div class="post-arrow">→</div>
    </a>
  `).join('');
}

init();
</script>
</body>
</html>
