<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivia Krowicka — Program Manager · Producer · Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    main { padding-top: 0; }
    section { padding: 7rem 4rem; max-width: 1100px; margin: 0 auto; }

    /* HERO */
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding-top: 8rem; padding-bottom: 4rem; }
    .hero-eyebrow { font-family: 'Fira Code', monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s; }
    .hero h1 { font-size: clamp(3rem, 7vw, 6.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; color: #fff; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.4s; }
    .hero h1 .line2 { display: block; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-sub { font-size: 1.2rem; color: var(--muted); max-width: 520px; margin-top: 1.5rem; font-weight: 300; opacity: 0; animation: fadeUp 0.8s ease forwards 0.6s; }
    .hero-sub strong { color: var(--text); font-weight: 500; }
    .hero-actions { display: flex; gap: 1rem; margin-top: 2.5rem; opacity: 0; animation: fadeUp 0.8s ease forwards 0.8s; }
    .hero-tags { display: flex; gap: 0.75rem; margin-top: 3.5rem; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s ease forwards 1s; }
    .tag { font-family: 'Fira Code', monospace; font-size: 0.72rem; padding: 0.35rem 0.85rem; border: 1px solid var(--border); border-radius: 100px; color: var(--muted); letter-spacing: 0.08em; }
    .hero-scroll { margin-top: 5rem; display: flex; align-items: center; gap: 1rem; opacity: 0; animation: fadeUp 0.8s ease forwards 1.2s; }
    .scroll-line { width: 60px; height: 1px; background: linear-gradient(to right, var(--accent), transparent); }
    .scroll-text { font-family: 'Fira Code', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

    /* ABOUT */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; margin-top: 3rem; }
    .about-text h2 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -0.02em; color: #fff; margin-bottom: 1.5rem; }
    .about-text h2 span { color: var(--accent); }
    .about-text p { color: var(--muted); font-size: 1rem; margin-bottom: 1rem; font-weight: 300; }
    .about-text p strong { color: var(--text); font-weight: 500; }
    .about-text .about-cta { margin-top: 1.5rem; }
    .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: border-color 0.2s; }
    .stat-card:hover { border-color: rgba(0,255,255,0.25); }
    .stat-num { font-family: 'Exo 2', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 0.25rem; }
    .stat-label { font-size: 0.8rem; color: var(--muted); font-weight: 300; }

    /* SKILLS */
    .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .skill-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; transition: border-color 0.25s, transform 0.25s; position: relative; overflow: hidden; }
    .skill-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,255,255,0.05), transparent); opacity: 0; transition: opacity 0.25s; }
    .skill-card:hover { border-color: rgba(0,255,255,0.3); transform: translateY(-4px); }
    .skill-card:hover::before { opacity: 1; }
    .skill-icon { font-size: 1.75rem; margin-bottom: 1rem; display: block; }
    .skill-card h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
    .skill-list { list-style: none; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .skill-list li { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.06em; padding: 0.25rem 0.6rem; background: rgba(255,255,255,0.05); border-radius: 4px; color: var(--muted); }

    /* PROJECTS */
    .projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 1rem; transition: border-color 0.25s, transform 0.25s; position: relative; overflow: hidden; cursor: pointer; }
    .project-card::after { content: '→'; position: absolute; top: 1.5rem; right: 1.75rem; font-size: 1.2rem; color: var(--accent); opacity: 0; transform: translateX(-8px); transition: opacity 0.2s, transform 0.2s; }
    .project-card:hover { border-color: rgba(0,255,255,0.35); transform: translateY(-4px); }
    .project-card:hover::after { opacity: 1; transform: translateX(0); }
    .project-status { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .project-card h3 { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
    .project-card p { font-size: 0.875rem; color: var(--muted); font-weight: 300; flex: 1; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .project-tag { font-family: 'Fira Code', monospace; font-size: 0.62rem; padding: 0.2rem 0.55rem; border-radius: 4px; background: rgba(255,0,170,0.1); color: var(--accent2); letter-spacing: 0.06em; }
    .section-footer { margin-top: 2.5rem; text-align: center; }

    /* POSTS */
    .posts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-decoration: none; color: inherit; display: block; transition: border-color 0.25s, transform 0.25s; }
    .post-card:hover { border-color: rgba(255,0,170,0.3); transform: translateY(-4px); }
    .post-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .post-cat { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); }
    .post-date { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--muted); }
    .post-card h3 { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; letter-spacing: -0.01em; line-height: 1.3; }
    .post-card p { font-size: 0.85rem; color: var(--muted); font-weight: 300; line-height: 1.6; }
    .post-read { margin-top: 1.25rem; font-family: 'Fira Code', monospace; font-size: 0.7rem; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase; }

    /* CONTACT */
    .contact-inner { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 4rem; text-align: center; position: relative; overflow: hidden; margin-top: 3rem; }
    .contact-inner::before { content: ''; position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 400px; height: 400px; background: radial-gradient(ellipse, rgba(0,255,255,0.07), transparent 70%); pointer-events: none; }
    .contact-inner h2 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: -0.02em; color: #fff; margin-bottom: 1rem; }
    .contact-inner > p { color: var(--muted); max-width: 480px; margin: 0 auto 2rem; font-weight: 300; }
    .contact-links { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .contact-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
    .contact-link:hover { border-color: var(--accent); color: var(--text); }

    @media (max-width: 768px) {
      section { padding: 4rem 1.5rem; }
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .skills-grid, .projects-grid, .posts-grid { grid-template-columns: 1fr; }
      .contact-inner { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-mesh-mid"></div>
<div class="grain"></div>
<canvas id="orbs"></canvas>

<nav>
  <a href="index.html" class="nav-logo">OK<span>.</span></a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="blog.html">Writing</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="https://github.com/olliekrow" class="nav-cta" target="_blank">GitHub</a>
</nav>

<main id="main-content">
  <!-- Rendered by JS -->
</main>

<footer>
  <p>© 2026 Ollie Krow — Built on <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
  <p><a href="https://github.com/said7388/developer-portfolio" target="_blank">Design inspiration</a></p>
</footer>

<script src="js/orbs.js"></script>
<script src="js/reveal.js"></script>
<script>
async function init() {
  const [site, posts] = await Promise.all([
    fetch('data/site.json').then(r => r.json()),
    fetch('data/posts.json').then(r => r.json())
  ]);

  const ICON_GITHUB = `<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>`;
  const ICON_EMAIL = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
  const ICON_DOCS  = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>`;
  const icons = { github: ICON_GITHUB, email: ICON_EMAIL, docs: ICON_DOCS };

  const dotClass = s => s === 'live' ? 'dot-live' : s === 'wip' ? 'dot-wip' : 'dot-planned';

  document.getElementById('main-content').innerHTML = `

    <!-- HERO -->
    <section class="hero" style="padding-top:8rem;padding-bottom:4rem;min-height:100vh;display:flex;flex-direction:column;justify-content:center;">
      <p class="hero-eyebrow">${site.hero.eyebrow}</p>
      <h1>${site.hero.heading}<span class="line2">${site.hero.heading_gradient}</span></h1>
      <p class="hero-sub">${site.hero.sub}</p>
      <div class="hero-actions">
        <a href="projects.html" class="btn-primary">See My Work</a>
        <a href="about.html" class="btn-secondary">About Me</a>
      </div>
      <div class="hero-tags">
        ${site.hero.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="hero-scroll">
        <div class="scroll-line"></div>
        <span class="scroll-text">Scroll to explore</span>
      </div>
    </section>

    <div class="divider"></div>

    <!-- ABOUT -->
    <section id="about">
      <p class="section-label reveal">About</p>
      <div class="about-grid">
        <div class="about-text reveal">
          <h2>${site.about.heading.replace(site.about.heading_accent, `<span>${site.about.heading_accent}</span>`)}</h2>
          ${site.about.paragraphs.slice(0,2).map(p => `<p>${p}</p>`).join('')}
          <div class="about-cta"><a href="about.html" class="btn-secondary">More About Me →</a></div>
        </div>
        <div class="about-stats reveal">
          ${site.about.stats.map(s => `
            <div class="stat-card">
              <div class="stat-num">${s.num}</div>
              <div class="stat-label">${s.label}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- SKILLS -->
    <section id="skills">
      <p class="section-label reveal">What I Bring</p>
      <div class="skills-grid">
        ${site.skills.map(s => `
          <div class="skill-card reveal">
            <span class="skill-icon">${s.icon}</span>
            <h3>${s.title}</h3>
            <ul class="skill-list">${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>`).join('')}
      </div>
    </section>

    <div class="divider"></div>

    <!-- FEATURED PROJECTS -->
    <section id="projects">
      <p class="section-label reveal">Featured Projects</p>
      <div class="projects-grid">
        ${site.projects.map(p => `
          <div class="project-card reveal" onclick="location.href='projects.html#${p.id}'">
            <div class="project-status"><span class="dot ${dotClass(p.status)}"></span> ${p.status_label}</div>
            <h3>${p.title}</h3>
            <p>${p.summary}</p>
            <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
          </div>`).join('')}
      </div>
      <div class="section-footer reveal"><a href="projects.html" class="btn-secondary">View All Projects →</a></div>
    </section>

    <div class="divider"></div>

    <!-- LATEST WRITING -->
    <section id="writing">
      <p class="section-label reveal">Latest Writing</p>
      <div class="posts-grid">
        ${posts.slice(0,2).map(p => `
          <a href="post.html?slug=${p.slug}" class="post-card reveal">
            <div class="post-meta">
              <span class="post-cat">${p.category}</span>
              <span class="post-date">${p.date}</span>
            </div>
            <h3>${p.title}</h3>
            <p>${p.excerpt}</p>
            <div class="post-read">Read more →</div>
          </a>`).join('')}
      </div>
      <div class="section-footer reveal" style="margin-top:2.5rem;">
        <a href="blog.html" class="btn-secondary">All Posts →</a>
      </div>
    </section>

    <div class="divider"></div>

    <!-- CONTACT -->
    <section id="contact">
      <p class="section-label reveal">Contact</p>
      <div class="contact-inner reveal">
        <h2>${site.contact.heading}</h2>
        <p>${site.contact.sub}</p>
        <div class="contact-links">
          ${site.contact.links.map(l => `
            <a href="${l.url}" class="contact-link" ${l.url.startsWith('http') ? 'target="_blank"' : ''}>
              ${icons[l.icon] || ''} ${l.label}
            </a>`).join('')}
        </div>
      </div>
    </section>
  `;

  // Re-run reveal observer after render
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}
init();
</script>
</body>
</html>
