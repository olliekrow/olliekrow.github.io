<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Olivia Krowicka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    .about-content { display: grid; grid-template-columns: 2fr 1fr; gap: 5rem; align-items: start; margin-top: 2rem; }
    .about-body h2 { font-size: 1.75rem; font-weight: 800; color: #fff; margin-bottom: 1rem; letter-spacing: -0.02em; }
    .about-body h2 span { color: var(--accent); }
    .about-body p { color: var(--muted); margin-bottom: 1.25rem; font-weight: 300; font-size: 1rem; }
    .about-body p strong { color: var(--text); font-weight: 500; }
    .about-body .actions { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
    .about-sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
    .sidebar-card h4 { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .sidebar-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .sidebar-list li { font-size: 0.875rem; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; font-weight: 300; }
    .sidebar-list li::before { content: '›'; color: var(--accent); font-family: 'Fira Code', monospace; }
    .sidebar-list a { color: var(--accent); text-decoration: none; }
    .values-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
    .value-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; transition: border-color 0.25s, transform 0.25s; }
    .value-card:hover { border-color: rgba(0,255,255,0.25); transform: translateY(-3px); }
    .value-num { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--accent2); letter-spacing: 0.15em; margin-bottom: 0.75rem; }
    .value-card h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    .value-card p { font-size: 0.85rem; color: var(--muted); font-weight: 300; line-height: 1.6; }
    @media (max-width: 768px) {
      .about-content { grid-template-columns: 1fr; gap: 2rem; }
      .values-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-mesh-mid"></div>
<div class="grain"></div>
<canvas id="orbs"></canvas>

<nav>
  <a href="index.html" class="nav-logo">OK<span>.</span></a>
  <ul class="nav-links">
    <li><a href="about.html" class="active">About</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="blog.html">Writing</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <a href="https://github.com/olliekrow" class="nav-cta" target="_blank">GitHub</a>
</nav>

<main id="main-content"></main>

<footer>
  <p>© 2026 Olivia Krowicka — <a href="index.html">Home</a></p>
  <p><a href="https://github.com/olliekrow" target="_blank">github.com/olliekrow</a></p>
</footer>

<script src="js/orbs.js"></script>
<script src="js/reveal.js"></script>
<script>
async function init() {
  const site = await fetch('data/about.json').then(r => r.json());
  const a = site.about;

  document.getElementById('main-content').innerHTML = `
    <div class="page-hero">
      <p class="page-hero-eyebrow">// about me</p>
      <h1>I make sense<br><span>out of chaos.</span></h1>
      <p>Program manager by day, aspiring game designer by night. I connect loose conceptual threads and turn them into delivery roadmaps, taking a systematic approach to helping ideas come to life.</p>
    </div>

    <div class="divider"></div>

    <div class="page-section">
      <div class="about-content">
        <div class="about-body reveal">
          <h2>Hi, I'm Olivia...</h2>
          ${a.full.paragraphs.map(p => `<p>${p}</p>`).join('')}
          <div class="actions">
            <a href="projects.html" class="btn-primary">See My Projects</a>
            <a href="blog.html" class="btn-secondary">Read the Blog</a>
          </div>
        </div>
        <div class="about-sidebar reveal">
          <div class="sidebar-card">
            <h4>Disciplines</h4>
            <ul class="sidebar-list">
              ${a.full.disciplines.map(d => `<li>${d}</li>`).join('')}
            </ul>
          </div>
      <div class="sidebar-card">
          <h4>Certifications</h4>
          <ul class="sidebar-list">
              ${a.full.certifications.map(c => `<li>${c}</li>`).join('')}
          </ul>
        </div>
          <div class="sidebar-card">
            <h4>Tools</h4>
            <ul class="sidebar-list">
              ${a.full.tools.map(t => `<li>${t}</li>`).join('')}
            </ul>
          </div>
          <div class="sidebar-card">
            <h4>Find Me</h4>
            <ul class="sidebar-list">
              <li><a href="https://www.linkedin.com/in/okrowicka/" target="_blank">LinkedIn</a></li>
              <li><a href="https://github.com/olliekrow" target="_blank">GitHub</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="page-section">
      <p class="section-label reveal">Values</p>
      <div class="values-grid">
        ${site.values.map(p => `
          <div class="value-card reveal">
            <div class="value-num">${p.num}</div>
            <h3>${p.title}</h3>
            <p>${p.body}</p>
          </div>`).join('')}
      </div>
    </div>
  `;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}
init();
</script>
</body>
</html>
